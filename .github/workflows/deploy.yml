name: Build, Tag, and Push Docker Images

on:
  push:
    branches: 
      - master
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set Variables
        run: |
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "TAG=stable" >> $GITHUB_ENV
          elif [ "${{ github.ref }}" == "refs/heads/test" ]; then
            echo "TAG=latest" >> $GITHUB_ENV
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: registry.mythosimage.com
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push App Container
        uses: docker/build-push-action@v5
        with:
          context: .
          target: app
          push: true
          tags: registry.mythosimage.com/${{ github.repository }}-app:${{ env.TAG }}

      - name: Build and Push Assets Container
        uses: docker/build-push-action@v5
        with:
          context: .
          target: assets
          push: true
          tags: registry.mythosimage.com/${{ github.repository }}-assets:${{ env.TAG }}