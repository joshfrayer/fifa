<!DOCTYPE html>
<html lang="en">
<head>
  {% load static vite_assets %}
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Match</title>
  {% vite_entry 'js/channel_41_player_page.js' %}
</head>
<body class="bracket-page">
  <div class="tv-wrap">
    <div class="topbar tv-topbar">
      <div>
        <h1>Live Match</h1>
      </div>
    </div>

    <section class="player-panel">
      <div class="player-frame">
        <video id="channelPlayer" controls playsinline autoplay muted></video>
      </div>
      <div id="playerStatus" class="status"></div>
      <div id="playerError" class="error"></div>
      <div class="disclaimer">For educational and experimental use only and not for use outside of KDFW viewing range.</div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.8.0/dist/mpegts.min.js"></script>
  {{ transcode_proxy_url_absolute|json_script:"stream-url-data" }}
</body>
</html>
