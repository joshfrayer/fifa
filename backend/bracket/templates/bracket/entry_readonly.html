<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ entry.name }} - Submitted Bracket</title>
  <style>
    :root {
      --bg: #f3f5f7;
      --card: #ffffff;
      --line: #d8dde3;
      --text: #17212b;
      --muted: #607182;
      --accent-soft: #d8f4ea;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      width: min(1280px, 95vw);
      margin: 1.2rem auto 2rem;
    }

    .head {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0.9rem 1rem;
      margin-bottom: 1rem;
    }

    h1 { margin: 0; font-size: 1.2rem; }

    .sub { margin-top: 0.32rem; color: var(--muted); font-size: 0.88rem; }

    .layout {
      display: grid;
      grid-template-columns: repeat(9, minmax(120px, 1fr));
      gap: 0.65rem;
      align-items: center;
      overflow-x: auto;
      padding-bottom: 0.75rem;
    }

    .round {
      background: color-mix(in srgb, var(--card) 92%, #edf2f7 8%);
      border: 1px solid var(--line);
      border-radius: 0.8rem;
      padding: 0.6rem;
      height: fit-content;
    }

    .round h2 {
      margin: 0 0 0.8rem;
      font-size: 0.82rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .matches { display: grid; gap: 0.7rem; }
    .matches.tight { gap: 0.45rem; }
    .matches.medium { gap: 1rem; }
    .matches.loose { gap: 2rem; }
    .matches.single { gap: 0; }

    .match {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 0.6rem;
      padding: 0.35rem;
      display: grid;
      gap: 0.35rem;
    }

    .team {
      border: 1px solid var(--line);
      border-radius: 0.45rem;
      padding: 0.3rem 0.4rem;
      font-size: 0.82rem;
      background: #fdfefe;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .team.selected {
      background: var(--accent-soft);
      border-color: #9fd8c4;
      color: #0d503b;
      font-weight: 700;
    }

    .flag {
      width: 18px;
      height: 13px;
      border-radius: 2px;
      border: 1px solid #cfd7df;
      object-fit: cover;
      flex: 0 0 auto;
      background: #eef3f8;
    }

    .final-col {
      display: grid;
      gap: 0.65rem;
      align-content: center;
    }

    .champion {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      height: fit-content;
      background: linear-gradient(145deg, #f8fafb 0%, #eef4f8 100%);
      border: 1px solid var(--line);
      border-radius: 0.8rem;
      padding: 1rem;
    }

    .cup { font-size: 3rem; margin-bottom: 0.6rem; }

    .winner {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      padding: 0.45rem 0.75rem;
      border-radius: 0.6rem;
      background: var(--accent-soft);
      border: 1px solid #9fd8c4;
      min-width: 70%;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1>{{ entry.name }}'s Submitted Bracket</h1>
    </div>

    <div class="layout">
      <section class="round">
        <h2>Round of 32</h2>
        <div class="matches tight" id="left-r32"></div>
      </section>
      <section class="round">
        <h2>Round of 16</h2>
        <div class="matches medium" id="left-r16"></div>
      </section>
      <section class="round">
        <h2>Quarterfinal</h2>
        <div class="matches loose" id="left-qf"></div>
      </section>
      <section class="round">
        <h2>Semifinal</h2>
        <div class="matches single" id="left-sf"></div>
      </section>
      <section class="final-col">
        <section class="round">
          <h2>Final</h2>
          <div class="matches single" id="final"></div>
        </section>
        <section class="champion">
          <div class="cup">🏆</div>
          <div style="color: var(--muted); margin-bottom: 0.35rem;">Predicted Champion</div>
          <div class="winner" id="winner">TBD</div>
        </section>
      </section>
      <section class="round">
        <h2>Semifinal</h2>
        <div class="matches single" id="right-sf"></div>
      </section>
      <section class="round">
        <h2>Quarterfinal</h2>
        <div class="matches loose" id="right-qf"></div>
      </section>
      <section class="round">
        <h2>Round of 16</h2>
        <div class="matches medium" id="right-r16"></div>
      </section>
      <section class="round">
        <h2>Round of 32</h2>
        <div class="matches tight" id="right-r32"></div>
      </section>
    </div>
  </div>

  {{ entry.picks|json_script:"entry-rounds" }}
  {{ initial_teams|json_script:"initial-teams" }}

  <script>
    const rounds = JSON.parse(document.getElementById("entry-rounds").textContent);
    const initialTeams = JSON.parse(document.getElementById("initial-teams").textContent);
    const FLAG_CDN_BASE = "https://flagcdn.com";
    const COUNTRY_TO_ISO2 = {
      "south africa": "za", "canada": "ca", "netherlands": "nl", "morocco": "ma",
      "germany": "de", "paraguay": "py", "france": "fr", "sweden": "se",
      "belgium": "be", "senegal": "sn", "united states": "us", "usa": "us",
      "bosnia and herzegovina": "ba", "bosnia": "ba", "spain": "es", "austria": "at",
      "portugal": "pt", "croatia": "hr", "brazil": "br", "japan": "jp",
      "ivory coast": "ci", "cote d'ivoire": "ci", "cote divoire": "ci", "norway": "no",
      "mexico": "mx", "ecuador": "ec", "england": "gb-eng", "dr congo": "cd",
      "democratic republic of the congo": "cd", "switzerland": "ch", "algeria": "dz",
      "colombia": "co", "ghana": "gh", "argentina": "ar", "cabo verde": "cv",
      "cape verde": "cv", "australia": "au", "egypt": "eg", "eqypt": "eg"
    };
    const COUNTRY_TO_FIFA3 = {
      "south africa": "RSA", "canada": "CAN", "netherlands": "NED", "morocco": "MAR",
      "germany": "GER", "paraguay": "PAR", "france": "FRA", "sweden": "SWE",
      "belgium": "BEL", "senegal": "SEN", "united states": "USA", "usa": "USA",
      "bosnia and herzegovina": "BIH", "bosnia": "BIH", "spain": "ESP", "austria": "AUT",
      "portugal": "POR", "croatia": "CRO", "brazil": "BRA", "japan": "JPN",
      "ivory coast": "CIV", "cote d'ivoire": "CIV", "cote divoire": "CIV", "norway": "NOR",
      "mexico": "MEX", "ecuador": "ECU", "england": "ENG", "dr congo": "COD",
      "democratic republic of the congo": "COD", "switzerland": "SUI", "algeria": "ALG",
      "colombia": "COL", "ghana": "GHA", "argentina": "ARG", "cabo verde": "CPV",
      "cape verde": "CPV", "australia": "AUS", "egypt": "EGY", "eqypt": "EGY"
    };

    function normalizeCountryName(name) {
      return (name || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9' ]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function getFlagUrl(teamName) {
      const code = COUNTRY_TO_ISO2[normalizeCountryName(teamName)] || null;
      return code ? `${FLAG_CDN_BASE}/${code}.svg` : null;
    }

    function getFifaCode(teamName) {
      return COUNTRY_TO_FIFA3[normalizeCountryName(teamName)] || teamName;
    }

    function teamsForRound(roundIndex) {
      if (roundIndex === 0) return initialTeams;
      const prior = rounds[roundIndex - 1] || [];
      return prior.map((team) => team || "TBD");
    }

    function renderRoundSlice(containerId, roundIndex, startMatch, count) {
      const container = document.getElementById(containerId);
      const teams = teamsForRound(roundIndex);
      container.innerHTML = "";

      for (let matchIndex = startMatch; matchIndex < startMatch + count; matchIndex += 1) {
        const i = matchIndex * 2;
        const selected = (rounds[roundIndex] || [])[matchIndex] || null;

        const match = document.createElement("div");
        match.className = "match";

        [teams[i], teams[i + 1]].forEach((team) => {
          const row = document.createElement("div");
          row.className = "team";

          const flagUrl = getFlagUrl(team);
          if (flagUrl) {
            const flag = document.createElement("img");
            flag.className = "flag";
            flag.src = flagUrl;
            flag.alt = `${team} flag`;
            flag.loading = "lazy";
            flag.referrerPolicy = "no-referrer";
            flag.addEventListener("error", () => flag.remove());
            row.appendChild(flag);
          }

          const label = document.createElement("span");
          label.textContent = team && team !== "TBD" ? getFifaCode(team) : "TBD";
          row.appendChild(label);

          if (selected === team) row.classList.add("selected");
          match.appendChild(row);
        });

        container.appendChild(match);
      }
    }

    function renderAll() {
      renderRoundSlice("left-r32", 0, 0, 8);
      renderRoundSlice("left-r16", 1, 0, 4);
      renderRoundSlice("left-qf", 2, 0, 2);
      renderRoundSlice("left-sf", 3, 0, 1);
      renderRoundSlice("right-r32", 0, 8, 8);
      renderRoundSlice("right-r16", 1, 4, 4);
      renderRoundSlice("right-qf", 2, 2, 2);
      renderRoundSlice("right-sf", 3, 1, 1);
      renderRoundSlice("final", 4, 0, 1);

      const champion = (rounds[4] || [])[0] || "TBD";
      document.getElementById("winner").textContent = champion;
    }

    renderAll();
  </script>
</body>
</html>
